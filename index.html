<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fireboy The Brothers: The Legend of Terra Nemesis - Boss Rush Mode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; max-width: 100vw; max-height: 100vh; image-rendering: pixelated; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="480"></canvas>
  <script>
    // CommonJS shim: each script uses require()/module.exports for Jest tests.
    // This shim lets the same files load in the browser without a bundler.
    var _modules = {};
    var module = { exports: {} };
    function require(path) {
      var key = path.replace(/^\.\//, '').replace(/^\.\.\/src\//, '').replace(/\.js$/, '');
      return _modules[key] || {};
    }
    function _register(name) {
      _modules[name] = module.exports;
      module = { exports: {} };
    }
  </script>
  <script src="src/collision.js"></script>
  <script>_register('collision');</script>
  <script src="src/input.js"></script>
  <script>_register('input');</script>
  <script src="src/projectiles.js"></script>
  <script>_register('projectiles');</script>
  <script src="src/player.js"></script>
  <script>_register('player');</script>
  <script src="src/bosses.js"></script>
  <script>_register('bosses');</script>
  <script src="src/audio.js"></script>
  <script>_register('audio');</script>
  <script src="src/ui.js"></script>
  <script>_register('ui');</script>
  <script src="src/engine.js"></script>
  <script>_register('engine');</script>
  <script>
    console.log('Fireboy The Brothers: Boss Rush Mode loaded');
  </script>
</body>
</html>
